<h2 class="auth-title">
    Create Account
</h2>

<p class="auth-subtitle">
    Register to continue
</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- TITLE -->
    <div class="mb-3">

        <label class="form-label">
            Title
        </label>

        <select
            formControlName="title"
            class="form-select"
            [ngClass]="{
                'is-invalid': submitted && f.title.errors
            }"
        >

            <option value="">
                Select title
            </option>

            <option value="Mr">Mr</option>
            <option value="Mrs">Mrs</option>
            <option value="Miss">Miss</option>
            <option value="Ms">Ms</option>

        </select>

    </div>

    <!-- FIRST NAME -->
    <div class="mb-3">

        <label class="form-label">
            First Name
        </label>

        <input
            type="text"
            formControlName="firstName"
            class="form-control"
            placeholder="Enter first name"
        />

    </div>

    <!-- LAST NAME -->
    <div class="mb-3">

        <label class="form-label">
            Last Name
        </label>

        <input
            type="text"
            formControlName="lastName"
            class="form-control"
            placeholder="Enter last name"
        />

    </div>

    <!-- EMAIL -->
    <div class="mb-3">

        <label class="form-label">
            Email
        </label>

        <input
            type="email"
            autocomplete="email"
            formControlName="email"
            class="form-control"
            placeholder="Enter email"
        />

    </div>

    <!-- PASSWORD -->
    <div class="mb-3">

        <label class="form-label">
            Password
        </label>

        <input
            type="password"
            autocomplete="new-password"
            formControlName="password"
            class="form-control"
            placeholder="Enter password"
        />

    </div>

    <!-- CONFIRM -->
    <div class="mb-3">

        <label class="form-label">
            Confirm Password
        </label>

        <input
            type="password"
            autocomplete="new-password"
            formControlName="confirmPassword"
            class="form-control"
            placeholder="Confirm password"
        />

    </div>

    <!-- TERMS -->
    <div class="form-check mb-4">

        <input
            type="checkbox"
            id="acceptTerms"
            formControlName="acceptTerms"
            class="form-check-input"
        />

        <label
            for="acceptTerms"
            class="form-check-label"
        >
            Accept Terms & Conditions
        </label>

    </div>

    <!-- BUTTON -->
    <button
        [disabled]="submitting"
        class="btn btn-auth-primary w-100"
    >

        <span
            *ngIf="submitting"
            class="spinner-border spinner-border-sm me-2"
        >
        </span>

        REGISTER

    </button>

    <!-- LOGIN -->
    <div class="text-center mt-4">

        <span class="text-light-soft">
            Already have an account?
        </span>

        <a
            routerLink="../login"
            class="auth-link ms-2"
        >
            Login
        </a>

    </div>

</form>
