<h2 class="auth-title">Reset Password</h2>

<p class="auth-subtitle">
    Enter your new password below
</p>

<div *ngIf="tokenStatus == TokenStatus.Validating" class="text-center my-4">
    <span class="spinner-border spinner-border-sm me-2 text-purple-light"></span>
    <span class="text-light-soft">Validating token...</span>
</div>

<div *ngIf="tokenStatus == TokenStatus.Invalid" class="alert alert-danger mb-4">
    Token validation failed. If the token has expired, you can get a new one at the <a routerLink="../forgot-password" class="alert-link text-white fw-bold">Forgot Password</a> page.
</div>

<form *ngIf="tokenStatus == TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- PASSWORD -->
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input
            type="password"
            autocomplete="new-password"
            formControlName="password"
            class="form-control"
            placeholder="Enter new password"
            [ngClass]="{ 'is-invalid': submitted && f.password.errors }"
        />
        <div *ngIf="submitted && f.password.errors" class="invalid-feedback">
            <div *ngIf="f.password.errors.required">Password is required</div>
            <div *ngIf="f.password.errors.minlength">Password must be at least 6 characters</div>
        </div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input
            type="password"
            autocomplete="new-password"
            formControlName="confirmPassword"
            class="form-control"
            placeholder="Confirm new password"
            [ngClass]="{ 'is-invalid': submitted && f.confirmPassword.errors }"
        />
        <div *ngIf="submitted && f.confirmPassword.errors" class="invalid-feedback">
            <div *ngIf="f.confirmPassword.errors.required">Confirm Password is required</div>
            <div *ngIf="f.confirmPassword.errors.mustMatch">Passwords must match</div>
        </div>
    </div>

    <!-- SUBMIT -->
    <div class="mb-3">
        <button [disabled]="loading" class="btn btn-auth-primary w-100">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            RESET PASSWORD
        </button>
    </div>

    <!-- CANCEL -->
    <div class="text-center mt-3">
        <a routerLink="../login" class="auth-link">Cancel</a>
    </div>

</form>
